<mat-card>
  <mat-card-title>GetVotes</mat-card-title>
  <mat-card-content>
    <p>Use the button below to increase the vote total.</p>
    <p class="vote-count">Votes: {{ votes }}</p>
  </mat-card-content>
  <mat-card-actions>
    <button mat-raised-button color="accent" (click)="vote()">Vote</button>
  </mat-card-actions>
</mat-card>
